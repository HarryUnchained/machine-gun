services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: machine-gun-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    container_name: machine-gun-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  backend:
    image: machine-gun:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machine-gun
    ports:
      - "3000:3000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: apps/backend/.env
    environment:
      APP_PORT: 3000
      NODE_ENV: production
      RABBIT: amqp://guest:guest@rabbitmq:5672
      KAFKA: kafka:9092
    volumes:
      - ./apps/backend/data:/app/data
    restart: unless-stopped

  test-consumer:
    image: machine-gun:test-consumer
    build:
      context: .
      dockerfile: apps/test-consumer/Dockerfile
    container_name: machine-gun-test-consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RABBIT: amqp://guest:guest@rabbitmq:5672
      KAFKA: kafka:9092
      TEST_CONSUMER_PORT: 3001
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  rabbitmq-data:
